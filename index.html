    * { box-sizing: border-box; margin: 0; padding: 0; }

    #hud {
      position: fixed; top: 20px; left: 20px; z-index: 999;
      background: linear-gradient(135deg, rgba(15,20,30,0.88) 0%, rgba(25,35,55,0.82) 100%);
      border: 1px solid rgba(100,160,255,0.25);
      color: #fff; font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px; padding: 14px 18px; border-radius: 12px;
      max-width: 300px; line-height: 1.55; pointer-events: none;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
    }
    #hud .hud-tag {
      font-size: 10px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; color: #64a0ff; margin-bottom: 6px;
    }
    #hud .task { font-size: 13px; color: #e8edf5; transition: color .3s; }
    #hud .progress-row { display: flex; gap: 5px; margin-top: 10px; }
    .pip { flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.12); transition: background .4s; }
    .pip.done   { background: #4cff88; box-shadow: 0 0 6px #4cff88; }
    .pip.active { background: #64a0ff; }

    #hud-right {
      position: fixed; top: 20px; right: 20px; z-index: 999;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .hud-pill {
      background: rgba(15,20,30,0.82);
      border: 1px solid rgba(100,160,255,0.2);
      color: #c8d8f0; font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px; padding: 7px 13px; border-radius: 20px;
      display: flex; align-items: center; gap: 8px;
      backdrop-filter: blur(8px);
    }
    .bat-bar { width: 30px; height: 11px; border: 1.5px solid #c8d8f0; border-radius: 3px; position: relative; }
    .bat-bar::after { content: ''; position: absolute; right: -4px; top: 50%;
      transform: translateY(-50%); width: 3px; height: 6px;
      background: #c8d8f0; border-radius: 0 2px 2px 0; }
    .bat-fill { height: 100%; background: #4cff88; border-radius: 2px; width: 75%; }

    #controls-hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; pointer-events: none;
      background: rgba(15,20,30,0.75); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(200,210,230,0.8); font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 11px; padding: 7px 16px; border-radius: 20px; letter-spacing: 0.5px;
    }

    #selected-badge {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      z-index: 999; pointer-events: none;
      background: rgba(20,60,120,0.9); backdrop-filter: blur(6px);
      border: 1px solid rgba(100,160,255,0.5);
      color: #a8d0ff; font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px; padding: 8px 20px; border-radius: 20px;
      display: none;
    }
    #selected-badge.visible { display: block; }

    #flash { position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity .15s; }
    #flash.good { background: rgba(0,200,80,0.18); opacity: 1; }
    #flash.bad  { background: rgba(200,30,30,0.22); opacity: 1; }

  <script>
    AFRAME.registerComponent('collision-walls', {
      init() {
        this.r = 0.38;
        this.boxes = [
          { xmin:-20,    xmax:-11.85, zmin:-20,    zmax: 10    },
          { xmin: 11.85, xmax: 20,    zmin:-20,    zmax: 10    },
          { xmin:-20,    xmax: 20,    zmin:-20,    zmax:-15.85 },
          { xmin:-9.8,   xmax:-6.2,   zmin:-12.3,  zmax:-5.7   },
          { xmin: 6.2,   xmax: 9.8,   zmin:-12.3,  zmax:-5.7   },
        ];
        this._wp = new AFRAME.THREE.Vector3();
      },
      tick() {
        this.el.object3D.getWorldPosition(this._wp);
        const wx = this._wp.x, wz = this._wp.z;
        const lp = this.el.object3D.position;
        const r = this.r;
        for (const b of this.boxes) {
          if (wx <= b.xmin-r || wx >= b.xmax+r ||
              wz <= b.zmin-r || wz >= b.zmax+r) continue;
          const dL = wx-(b.xmin-r), dR = (b.xmax+r)-wx;
          const dF = wz-(b.zmin-r), dB = (b.zmax+r)-wz;
          const m = Math.min(dL, dR, dF, dB);
          if      (m===dL) lp.x -= dL;
          else if (m===dR) lp.x += dR;
          else if (m===dF) lp.z -= dF;
          else             lp.z += dB;
        }
      }
    });

    AFRAME.registerComponent('jump-controls', {
      schema: { jumpForce: {default: 8.5}, gravity: {default: -16} },
      init() {
        this.vy = 0;
        this.grounded = true;
        this.groundY = 0;
        this.onKeyDown = (e) => {
          if (e.code === 'Space' && this.grounded) {
            e.preventDefault();
            this.vy = this.data.jumpForce;
            this.grounded = false;
          }
        };
        window.addEventListener('keydown', this.onKeyDown);
      },
      remove() { window.removeEventListener('keydown', this.onKeyDown); },
      tick(t, dt) {
        if (this.grounded) return;
        const s = Math.min(dt, 50) / 1000;
        this.vy += this.data.gravity * s;
        const p = this.el.object3D.position;
        p.y += this.vy * s;
        if (p.y <= this.groundY) {
          p.y = this.groundY;
          this.vy = 0;
          this.grounded = true;
        }
      }
    });
  </script>

  <script>
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const lieferschein = shuffle([
      { id:'24513', ip:'192.168.1.10', network:'192.168.1', done:false },
      { id:'24514', ip:'10.0.0.5',     network:'10.0.0',    done:false },
      { id:'24515', ip:'172.16.5.3',   network:'172.16.5',  done:false },
      { id:'24516', ip:'192.168.1.10', network:'192.168.1', done:false },
      { id:'24517', ip:'10.0.0.5',     network:'10.0.0',    done:false },
    ]);

    const slotPool = [
      // Regal A – unten
      [-8.8,1.2,-6.8], [-7.4,1.2,-6.8], [-8.8,1.2,-8.0], [-7.4,1.2,-8.0],
      [-8.8,1.2,-9.5], [-7.4,1.2,-9.5], [-8.8,1.2,-11.0],[-7.4,1.2,-11.0],
      // Regal A – mitte
      [-8.8,2.42,-7.0],[-7.4,2.42,-7.0],[-8.8,2.42,-9.0],[-7.4,2.42,-9.0],[-8.8,2.42,-11.0],
      // Regal A – oben
      [-8.0,3.62,-7.5],[-8.0,3.62,-10.0],
      // Regal B – unten
      [7.5,1.2,-6.8],[8.8,1.2,-6.8],[7.5,1.2,-8.5],[8.8,1.2,-8.5],
      [7.5,1.2,-10.5],[8.8,1.2,-10.5],
      // Regal B – mitte
      [7.5,2.42,-7.5],[8.8,2.42,-9.0],
      // Regal B – oben
      [8.0,3.62,-8.5],
    ];
    const netzwerkMap = { '192.168.1':'palette-1', '10.0.0':'palette-2', '172.16.5':'palette-3' };
    let selectedPaket = null;
    let score = 0;

    // Progress Pips
    const pipsEl = document.getElementById('progress-pips');
    lieferschein.forEach((_,i) => {
      const pip = document.createElement('div');
      pip.className = 'pip' + (i===0?' active':'');
      pip.id = 'pip-'+i;
      pipsEl.appendChild(pip);
    });

    let hoveredEl = null;

    document.querySelectorAll('.paket').forEach(p => {
      p.addEventListener('mouseenter', () => {
        hoveredEl = p;
        if (p !== selectedPaket) {
          p.setAttribute('material','emissive','#8b6a20');
          p.setAttribute('material','emissiveIntensity','0.35');
        }
      });
      p.addEventListener('mouseleave', () => {
        if (hoveredEl === p) hoveredEl = null;
        if (p !== selectedPaket) {
          p.setAttribute('material','emissive','#000000');
          p.setAttribute('material','emissiveIntensity','0');
        }
      });
    });

    document.querySelectorAll('.palette-zone').forEach(pal => {
      pal.addEventListener('mouseenter', () => { hoveredEl = pal; });
      pal.addEventListener('mouseleave', () => { if (hoveredEl === pal) hoveredEl = null; });
    });

    // B: Netzklasse ermitteln
    function getNetClass(ip) {
      const first = parseInt(ip.split('.')[0]);
      if (first === 10)  return 'Klasse A · Private';
      if (first === 172) return 'Klasse B · Private';
      if (first === 192) return 'Klasse C · Private';
      return '';
    }

    // E: IP in Binär umwandeln
    function ipToBinary(ip) {
      return ip.split('.').map(o => parseInt(o).toString(2).padStart(8,'0')).join('.');
    }

    // C: Timer
    let timerInterval = null, timerSeconds = 0, timerStarted = false;
    function startTimer() {
      if (timerStarted) return;
      timerStarted = true;
      timerInterval = setInterval(() => {
        timerSeconds++;
        const m = String(Math.floor(timerSeconds/60)).padStart(2,'0');
        const s = String(timerSeconds%60).padStart(2,'0');
        document.getElementById('timer-pill').textContent = '⏱ ' + m + ':' + s;
      }, 1000);
    }
    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    // D: Palette als "voll" markieren
    function checkPaletteComplete(palId) {
      const relevant = lieferschein.filter(e => netzwerkMap[e.network] === palId);
      if (relevant.length > 0 && relevant.every(e => e.done)) markPaletteFull(palId);
    }
    function markPaletteFull(palId) {
      const n = palId.split('-')[1];
      const statusEl = document.getElementById('pal-status-' + n);
      const bgEl     = document.getElementById('pal-bg-' + n);
      if (statusEl) {
        statusEl.setAttribute('value', 'FERTIG');
        statusEl.setAttribute('color', '#22cc55');
        statusEl.setAttribute('material', 'shader:flat;emissive:#22cc55;emissiveIntensity:0.7');
      }
      if (bgEl) {
        bgEl.setAttribute('material', 'color:#22cc55;emissive:#22cc55;emissiveIntensity:0.6');
        bgEl.setAttribute('animation__pulse',
          'property:material.emissiveIntensity;from:0.3;to:0.9;dur:500;dir:alternate;loop:4;easing:easeInOutSine');
      }
    }

    function interactWithPaket(el) {
      const ip   = el.getAttribute('data-ip');
      const pkid = el.getAttribute('data-id');
      const eintrag = lieferschein.find(e => e.id===pkid && !e.done);
      if (!eintrag) { showFeedback('Dieses Paket ist bereits erledigt!', false); return; }
      if (selectedPaket && selectedPaket !== el) {
        selectedPaket.setAttribute('material','emissive','#000000');
        selectedPaket.setAttribute('material','emissiveIntensity','0');
      }
      selectedPaket = el;
      el.setAttribute('material','emissive','#f0c030');
      el.setAttribute('material','emissiveIntensity','0.6');
      startTimer();
      const badge = document.getElementById('selected-badge');
      badge.innerHTML = '&#128230; Paket ' + pkid + ' &mdash; ' + ip + '<br><span style="font-size:10px;opacity:0.7">' + getNetClass(ip) + '</span>';
      badge.classList.add('visible');
      document.getElementById('task-text').textContent = 'Paket ' + pkid + ' ausgewählt — lege es auf die richtige Palette!';
      const binEl = document.getElementById('binary-display');
      binEl.textContent = ipToBinary(ip);
      binEl.style.display = 'block';
    }

    const paletteDeliveries = { 'palette-1': 0, 'palette-2': 0, 'palette-3': 0 };
    const palettePosMap = { 'palette-1': [-5, 1.5], 'palette-2': [0, 1.5], 'palette-3': [5, 1.5] };

    function spawnDeliveredBox(palId, ip) {
      const count = paletteDeliveries[palId];
      const [px, pz] = palettePosMap[palId];
      const col = count % 2;
      const row = Math.floor(count / 2);
      const x = px + (col - 0.5) * 0.38;
      const y = 0.20 + row * 0.26;
      const z = pz + 0.36;

      const box = document.createElement('a-entity');
      box.setAttribute('geometry', 'primitive:box;width:0.32;height:0.22;depth:0.28');
      box.setAttribute('material', 'color:#c8a060;roughness:0.9');
      box.setAttribute('position', `${x} ${y} ${z}`);
      box.setAttribute('scale', '0.01 0.01 0.01');
      box.setAttribute('animation__appear', 'property:scale;to:1 1 1;dur:500;easing:easeOutBack');

      const label = document.createElement('a-text');
      label.setAttribute('value', ip);
      label.setAttribute('color', '#fff');
      label.setAttribute('scale', '0.3 0.3 0.3');
      label.setAttribute('position', '0 0 0.15');
      label.setAttribute('align', 'center');
      label.setAttribute('material', 'shader:flat');
      box.appendChild(label);

      const check = document.createElement('a-text');
      check.setAttribute('value', 'ok');
      check.setAttribute('color', '#22cc55');
      check.setAttribute('scale', '0.45 0.45 0.45');
      check.setAttribute('position', '0 0.14 0.15');
      check.setAttribute('align', 'center');
      check.setAttribute('material', 'shader:flat');
      box.appendChild(check);

      document.querySelector('a-scene').appendChild(box);
      paletteDeliveries[palId]++;
    }

    function interactWithPalette(pal) {
      if (!selectedPaket) { showFeedback('Wähle zuerst ein Paket aus dem Regal!', false); return; }
      const paketIp = selectedPaket.getAttribute('data-ip');
      const paketId = selectedPaket.getAttribute('data-id');
      const palId   = pal.getAttribute('id');
      const net     = paketIp.split('.').slice(0,3).join('.');
      if (netzwerkMap[net] === palId) {
        const e = lieferschein.find(x => x.id===paketId && !x.done);
        if (e) e.done = true;
        const pos = selectedPaket.getAttribute('position');
        selectedPaket.setAttribute('animation__up',
          'property:position;to:'+pos.x+' '+(pos.y+1.3)+' '+pos.z+';dur:380;easing:easeInQuad');
        const pEl = selectedPaket;
        setTimeout(() => pEl.setAttribute('visible', false), 400);
        score += 100;
        selectedPaket.setAttribute('material','emissive','#000000');
        selectedPaket = null;
        document.getElementById('selected-badge').classList.remove('visible');
        document.getElementById('binary-display').style.display = 'none';
        document.getElementById('score-pill').textContent = '★ ' + score + ' Punkte';
        updateLieferschein(); updatePips();
        spawnDeliveredBox(palId, paketIp);
        checkPaletteComplete(palId);
        showFeedback('✅ Paket ' + paketId + ' korrekt zugestellt! +100', true);
        triggerFlash(true);
        if (lieferschein.every(x=>x.done)) {
          stopTimer();
          setTimeout(() => {
            const m = String(Math.floor(timerSeconds/60)).padStart(2,'0');
            const s = String(timerSeconds%60).padStart(2,'0');
            document.getElementById('task-text').textContent = '🎉 Alle Pakete zugestellt! Zeit: ' + m + ':' + s + ' — Ausgezeichnet!';
            document.getElementById('task-text').style.color = '#4cff88';
          }, 2400);
        }
      } else {
        showFeedback('❌ Falsche Palette! ' + paketIp + ' gehört nicht in dieses Netz.', false);
        triggerFlash(false);
        score = Math.max(0, score-20);
        document.getElementById('score-pill').textContent = '★ ' + score + ' Punkte';
        selectedPaket.setAttribute('material','emissive','#ff2020');
        selectedPaket.setAttribute('material','emissiveIntensity','0.7');
        const pEl = selectedPaket;
        setTimeout(() => {
          if (pEl === selectedPaket) {
            pEl.setAttribute('material','emissive','#f0c030');
            pEl.setAttribute('material','emissiveIntensity','0.6');
          }
        }, 600);
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'e' && e.key !== 'E') return;
      if (!hoveredEl) return;
      if (hoveredEl.classList.contains('paket')) interactWithPaket(hoveredEl);
      else if (hoveredEl.classList.contains('palette-zone')) interactWithPalette(hoveredEl);
    });

    function updatePips() {
      const nextOpen = lieferschein.findIndex(x => !x.done);
      lieferschein.forEach((e,i) => {
        const pip = document.getElementById('pip-'+i);
        if (!pip) return;
        pip.className = 'pip' + (e.done ? ' done' : (i===nextOpen ? ' active' : ''));
      });
    }

    function updateLieferschein() {
      const rows = lieferschein.map(e =>
        e.done ? '  Erledigt          ' : '      ' + e.id + '  ' + e.ip
      ).join('\n');
      const th = document.getElementById('ls-text-hand');
      if (th) th.setAttribute('value', 'MusterFirma GmbH\n14.01.2026\n\nID      IP\n' + rows);
    }

    function showFeedback(msg, ok) {
      const t = document.getElementById('task-text');
      t.style.color = ok ? '#4cff88' : '#ff5555';
      t.textContent = msg;
      setTimeout(() => {
        t.style.color = '#e8edf5';
        const offen = lieferschein.find(e => !e.done);
        if (offen) t.textContent = 'Nächstes Paket: ' + offen.id + ' (' + offen.ip + ') — richtige Palette wählen.';
      }, 2200);
    }

    function triggerFlash(ok) {
      const f = document.getElementById('flash');
      f.className = ok ? 'good' : 'bad';
      setTimeout(() => { f.className = ''; }, 350);
    }

    function mkConcreteCanvas(baseHex, tileSize) {
      const c = document.createElement('canvas');
      c.width = c.height = tileSize;
      const ctx = c.getContext('2d');
      ctx.fillStyle = baseHex;
      ctx.fillRect(0, 0, tileSize, tileSize);
      for (let i = 0; i < tileSize * tileSize * 0.25; i++) {
        ctx.globalAlpha = Math.random() * 0.1;
        ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000';
        const x = Math.random() * tileSize | 0, y = Math.random() * tileSize | 0;
        ctx.fillRect(x, y, 1 + (Math.random() * 2 | 0), 1 + (Math.random() * 2 | 0));
      }
      ctx.globalAlpha = 1;
      ctx.strokeStyle = 'rgba(0,0,0,0.07)'; ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        const x = Math.random() * tileSize;
        ctx.beginPath(); ctx.moveTo(x, 0);
        ctx.lineTo(x + (Math.random() - 0.5) * 15, tileSize); ctx.stroke();
      }
      const tex = new AFRAME.THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = AFRAME.THREE.RepeatWrapping;
      return tex;
    }

    function mkWoodCanvas(baseHex, tileSize) {
      const c = document.createElement('canvas');
      c.width = tileSize; c.height = tileSize >> 1;
      const ctx = c.getContext('2d');
      ctx.fillStyle = baseHex;
      ctx.fillRect(0, 0, c.width, c.height);
      for (let i = 0; i < 28; i++) {
        const y0 = (i / 28) * c.height;
        ctx.strokeStyle = i % 3 === 0 ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 0.7 + Math.random() * 1.1;
        ctx.beginPath(); ctx.moveTo(0, y0);
        for (let x = 0; x <= c.width; x += 16) ctx.lineTo(x, y0 + (Math.random() - 0.5) * 2);
        ctx.stroke();
      }
      const tex = new AFRAME.THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = AFRAME.THREE.RepeatWrapping;
      return tex;
    }

    function applyProceduralTextures() {
      const floorTex = mkConcreteCanvas('#5a4e3a', 512); floorTex.repeat.set(8, 10);
      const wallTex  = mkConcreteCanvas('#32364a', 512); wallTex.repeat.set(5, 2);
      const ceilTex  = mkConcreteCanvas('#22253a', 512); ceilTex.repeat.set(8, 6);
      const woodTex  = mkWoodCanvas('#9a7c42', 512);     woodTex.repeat.set(4, 1);
      const palTex   = mkWoodCanvas('#8a6628', 512);     palTex.repeat.set(2, 2);

      function applyTex(el, tex) {
        el.object3D.traverse(node => {
          if (node.isMesh && node.material && node.material.isMeshStandardMaterial) {
            node.material.map = tex;
            node.material.color.set(0xffffff);
            node.material.needsUpdate = true;
          }
        });
      }

      document.querySelectorAll('[mixin~="m-boden"]').forEach(el  => applyTex(el, floorTex));
      document.querySelectorAll('[mixin~="m-wand"]').forEach(el   => applyTex(el, wallTex));
      document.querySelectorAll('[mixin~="m-decke"]').forEach(el  => applyTex(el, ceilTex));
      document.querySelectorAll('[mixin~="m-regal-b"]').forEach(el => applyTex(el, woodTex));
      document.querySelectorAll('[mixin~="m-palette"]').forEach(el => applyTex(el, palTex));
    }

    document.querySelector('a-scene').addEventListener('loaded', () => {
      updateLieferschein();
      shuffle(slotPool);
      document.querySelectorAll('.interactable.paket').forEach((el, i) => {
        const [x, y, z] = slotPool[i];
        el.setAttribute('position', `${x} ${y} ${z}`);
      });
      applyProceduralTextures();
    });
  </script>
</body>
